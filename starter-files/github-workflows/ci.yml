name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, pdo, pdo_sqlite, gd

      - uses: oven-sh/setup-bun@v2
        if: hashFiles('bun.lock', 'bun.lockb') != ''

      - uses: actions/setup-node@v6
        if: hashFiles('package.json') != '' && hashFiles('bun.lock', 'bun.lockb') == ''
        with:
          node-version: "24"

      - name: Enable Corepack
        if: hashFiles('pnpm-lock.yaml', 'yarn.lock') != ''
        run: corepack enable

      - run: ./bin/ci
